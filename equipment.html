<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1E3A5F">
  <title>Equipment · NEMS</title>
  <link rel="manifest" href="assets/manifest.json">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="equipment">
  <header class="app-header">
    <a class="header-brand" href="dashboard.html">
      <img src="assets/logo.svg" alt="" class="header-logo">
      <span><strong>NAGA</strong><small>Equipment Management System</small></span>
    </a>
    <a class="admin-only header-action" href="site.html">Sites</a>
    <a class="admin-only header-action" href="add-equipment.html">Add</a>
  </header>

  <main class="app-main">
    <section class="page-title">
      <p class="eyebrow">Equipment</p>
      <h1>Asset Register</h1>
    </section>

    <section class="filter-panel">
      <label class="search-field">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="Name, ID, brand, serial number">
      </label>
      <div class="filter-grid">
        <label><span>Status</span><select id="statusFilter"></select></label>
        <label><span>Site</span><select id="siteFilter"></select></label>
        <label><span>Category</span><select id="categoryFilter"></select></label>
      </div>
    </section>

    <section class="equipment-list" id="equipmentList" aria-live="polite"></section>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <a href="dashboard.html">Home</a>
    <a href="equipment.html" class="active">Equipment</a>
    <a href="equipment.html?focus=search">Search</a>
    <a href="profile.html">Profile</a>
  </nav>

  <footer class="app-footer">© 2026 NAGA · Internal Use Only</footer>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
